name: Update Stock Radar Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/50 * * * *"

permissions:
  contents: write

concurrency:
  group: stock-radar-scan
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        run: python scripts/scan.py

      - name: Commit updated data
        run: |
          git config user.name "stock-radar-bot"
          git config user.email "stock-radar-bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update stock radar data"
          git push
